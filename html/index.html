<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrunxBridge Elevator</title>
  <style>
    :root {
      --panel: rgba(11, 18, 32, 0.94);
      --panel-2: rgba(15, 23, 42, 0.92);
      --card: rgba(255, 255, 255, 0.055);
      --card-hover: rgba(14, 165, 233, 0.13);
      --line: rgba(148, 163, 184, 0.16);
      --line-soft: rgba(148, 163, 184, 0.10);
      --text: #f8fafc;
      --muted: #94a3b8;
      --muted-2: #64748b;
      --accent: #38bdf8;
      --success: #22c55e;
      --danger: #ef4444;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background-color: rgba(0, 0, 0, 0) !important;
      background: rgba(0, 0, 0, 0) !important;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: none;
      pointer-events: none;
    }

    body::before,
    body::after {
      display: none !important;
      content: none !important;
      background: transparent !important;
    }

    body.visible {
      display: block;
    }


    .elevator {
      position: fixed;
      right: clamp(52px, 11vw, 220px);
      top: 50%;
      transform: translateY(-50%);
      width: min(430px, calc(100vw - 48px));
      max-height: min(680px, calc(100vh - 72px));
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(3, 7, 18, 0.94));
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.42);
      animation: slideIn 170ms ease-out;
      pointer-events: auto;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-50%) translateX(18px) scale(0.985); }
      to { opacity: 1; transform: translateY(-50%) translateX(0) scale(1); }
    }

    .topbar {
      display: grid;
      grid-template-columns: 44px 1fr 38px;
      align-items: center;
      gap: 12px;
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--line-soft);
      background:
        linear-gradient(135deg, rgba(56, 189, 248, 0.13), transparent 46%),
        rgba(255, 255, 255, 0.025);
    }

    .icon {
      position: relative;
      width: 44px;
      height: 44px;
      flex: none;
      display: grid;
      place-items: center;
      border: 1px solid rgba(125, 211, 252, 0.28);
      border-radius: 15px;
      color: #dff7ff;
      background: rgba(56, 189, 248, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.10);
    }

    .icon svg {
      width: 23px;
      height: 23px;
      opacity: 0.95;
    }

    .heading {
      min-width: 0;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .pulse {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.10);
    }

    .title {
      margin: 5px 0 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 18px;
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: -0.025em;
    }

    .close {
      width: 38px;
      height: 38px;
      flex: none;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 13px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.045);
      cursor: pointer;
      transition: 140ms ease;
    }

    .close:hover {
      color: var(--text);
      border-color: rgba(239, 68, 68, 0.42);
      background: rgba(239, 68, 68, 0.13);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px 14px 12px;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(255, 255, 255, 0.018);
    }

    .stat {
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.035);
    }

    .stat-value {
      display: block;
      font-size: 17px;
      font-weight: 900;
      line-height: 1;
    }

    .stat-label {
      display: block;
      margin-top: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }

    .content {
      padding: 12px;
      overflow: hidden;
    }

    .floor-list {
      max-height: 466px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .floor-list::-webkit-scrollbar {
      width: 4px;
    }

    .floor-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.035);
      border-radius: 999px;
    }

    .floor-list::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.34);
      border-radius: 999px;
    }

    .floor {
      width: 100%;
      position: relative;
      display: grid;
      grid-template-columns: 42px 1fr 68px;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      padding: 10px;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      color: var(--text);
      background: var(--card);
      cursor: pointer;
      text-align: left;
      outline: none;
      transition: transform 130ms ease, background 130ms ease, border-color 130ms ease, opacity 130ms ease;
    }

    .floor:hover:not(:disabled),
    .floor.selected:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(56, 189, 248, 0.42);
      background: var(--card-hover);
    }

    .floor.current {
      border-color: rgba(34, 197, 94, 0.42);
      background: rgba(34, 197, 94, 0.105);
    }

    .floor:disabled {
      opacity: 0.52;
      cursor: not-allowed;
    }

    .floor:last-child {
      margin-bottom: 0;
    }

    .floor-number {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(148, 163, 184, 0.13);
      border-radius: 13px;
      color: #dbeafe;
      background: rgba(2, 6, 23, 0.45);
      font-size: 15px;
      font-weight: 900;
    }

    .floor.current .floor-number {
      color: #bbf7d0;
      border-color: rgba(34, 197, 94, 0.28);
      background: rgba(34, 197, 94, 0.12);
    }

    .floor:disabled .floor-number {
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.24);
      background: rgba(239, 68, 68, 0.10);
    }

    .floor-info {
      min-width: 0;
    }

    .floor-name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 850;
      letter-spacing: -0.015em;
    }

    .floor-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .dot {
      width: 6px;
      height: 6px;
      flex: none;
      border-radius: 999px;
      background: var(--accent);
    }

    .floor.current .dot { background: var(--success); }
    .floor:disabled .dot { background: var(--danger); }

    .badge {
      min-width: 64px;
      height: 32px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 0 10px;
      border: 1px solid rgba(125, 211, 252, 0.18);
      border-radius: 999px;
      color: #bae6fd;
      background: rgba(56, 189, 248, 0.11);
      font-size: 10px;
      font-weight: 950;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .badge.current {
      color: #bbf7d0;
      border-color: rgba(34, 197, 94, 0.25);
      background: rgba(34, 197, 94, 0.13);
    }

    .badge.locked {
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.28);
      background: rgba(239, 68, 68, 0.13);
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px 14px;
      border-top: 1px solid var(--line-soft);
      color: var(--muted-2);
      background: rgba(255, 255, 255, 0.018);
      font-size: 10px;
      font-weight: 800;
    }

    .keys {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .key {
      min-width: 25px;
      height: 21px;
      display: inline-grid;
      place-items: center;
      padding: 0 7px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 7px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.055);
      font-size: 9px;
      font-weight: 950;
    }

    .empty {
      padding: 24px 16px;
      border: 1px dashed rgba(255, 255, 255, 0.13);
      border-radius: var(--radius-lg);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      text-align: center;
      font-size: 13px;
      font-weight: 750;
    }

    @media (max-height: 700px) {
      .summary { display: none; }
      .floor-list { max-height: 420px; }
      .topbar { padding: 14px; }
      .footer { padding: 11px 14px; }
    }

    @media (max-width: 900px) {
      .elevator {
        right: 18px;
        width: calc(100vw - 36px);
      }
    }

    @media (max-width: 420px) {
      .summary { grid-template-columns: 1fr; }
      .floor { grid-template-columns: 40px 1fr; }
      .badge { grid-column: 1 / -1; width: 100%; }
      .footer { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <section class="elevator" role="dialog" aria-modal="true" aria-labelledby="title">
      <header class="topbar">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M7 3h10a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3Z" stroke="currentColor" stroke-width="1.8" />
            <path d="M12 7v10M8.5 10.5 12 7l3.5 3.5M8.5 13.5 12 17l3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>

        <div class="heading">
          <div class="eyebrow"><span class="pulse"></span><span id="systemLabel">Elevator system</span></div>
          <h1 class="title" id="title">Elevator</h1>
        </div>

        <button class="close" id="close" aria-label="Sluiten">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
          </svg>
        </button>
      </header>

      <section class="summary" aria-label="Lift overzicht">
        <div class="stat">
          <span class="stat-value" id="totalFloors">0</span>
          <span class="stat-label" id="totalLabel">floors</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="availableFloors">0</span>
          <span class="stat-label" id="availableLabel">active</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="lockedFloors">0</span>
          <span class="stat-label" id="lockedLabel">locked</span>
        </div>
      </section>

      <main class="content">
        <div class="floor-list" id="floors"></div>
      </main>

      <footer class="footer">
        <span id="hintText">Select the correct floor.</span>
        <span class="keys"><span class="key">ESC</span><span id="closeHint">close</span></span>
      </footer>
  </section>

  <script>
    const resourceName = typeof GetParentResourceName === 'function' ? GetParentResourceName() : 'brnx_bridge';

    const body = document.body;
    const floorsEl = document.getElementById('floors');
    const titleEl = document.getElementById('title');
    const systemLabel = document.getElementById('systemLabel');
    const closeBtn = document.getElementById('close');
    const totalFloorsEl = document.getElementById('totalFloors');
    const availableFloorsEl = document.getElementById('availableFloors');
    const lockedFloorsEl = document.getElementById('lockedFloors');
    const hintText = document.getElementById('hintText');
    const closeHint = document.getElementById('closeHint');
    const totalLabel = document.getElementById('totalLabel');
    const availableLabel = document.getElementById('availableLabel');
    const lockedLabel = document.getElementById('lockedLabel');

    let currentFloor = null;
    let locale = {};
    let selectedIndex = 0;
    let lastFloors = [];

    function t(key, fallback) {
      return locale[key] || fallback;
    }

    function post(name, data = {}) {
      fetch(`https://${resourceName}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json; charset=UTF-8' },
        body: JSON.stringify(data)
      }).catch(() => {});
    }

    function closeUi() {
      body.classList.remove('visible');
      post('close');
    }

    function getShortLabel(floor, fallbackIndex) {
      const label = String(floor.label || '').trim();

      const parkingWords = ['parking', 'garage', 'parkeer'];
      if (parkingWords.some((word) => label.toLowerCase().includes(word))) return 'P';

      const match = label.match(/(-?\d+)/);
      if (match) return match[1];

      return String(floor.index || fallbackIndex + 1);
    }

    function getMetaText(floor) {
      if (floor.locked) return floor.lockedText || t('locked', 'Geen toegang');
      if (floor.index === currentFloor) return t('currentFloor', 'Huidige verdieping');
      return t('available', 'Beschikbaar');
    }

    function getBadgeText(floor) {
      if (floor.locked) return t('locked', 'Locked');
      if (floor.index === currentFloor) return t('here', 'Hier');
      return t('go', 'Ga');
    }

    function focusSelected() {
      const buttons = [...floorsEl.querySelectorAll('.floor:not(:disabled)')];
      if (!buttons.length) return;

      selectedIndex = Math.max(0, Math.min(selectedIndex, buttons.length - 1));

      buttons.forEach((button) => button.classList.remove('selected'));
      buttons[selectedIndex].classList.add('selected');
      buttons[selectedIndex].scrollIntoView({ block: 'nearest' });
    }

    function updateStats(floors) {
      const total = floors.length;
      const locked = floors.filter((floor) => floor.locked).length;
      const available = total - locked;

      totalFloorsEl.textContent = total;
      availableFloorsEl.textContent = available;
      lockedFloorsEl.textContent = locked;

      totalLabel.textContent = t('floors', 'Verdiepingen');
      availableLabel.textContent = t('available', 'Beschikbaar');
      lockedLabel.textContent = t('locked', 'Gelocked');
      hintText.textContent = t('selectFloor', 'Selecteer een verdieping om te reizen.');
      closeHint.textContent = t('close', 'Sluiten');
      systemLabel.textContent = t('elevatorSystem', 'Lift systeem');
    }

    function renderFloors(floors) {
      lastFloors = floors || [];
      floorsEl.innerHTML = '';
      updateStats(lastFloors);

      if (!lastFloors.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = t('noFloors', 'Geen verdiepingen beschikbaar.');
        floorsEl.appendChild(empty);
        return;
      }

      lastFloors.forEach((floor, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'floor';
        button.disabled = Boolean(floor.locked);
        button.dataset.floorIndex = String(floor.index);

        if (floor.index === currentFloor) button.classList.add('current');

        const number = document.createElement('span');
        number.className = 'floor-number';
        number.textContent = getShortLabel(floor, index);

        const info = document.createElement('span');
        info.className = 'floor-info';

        const name = document.createElement('span');
        name.className = 'floor-name';
        name.textContent = floor.label || `${t('floor', 'Verdieping')} ${floor.index}`;

        const meta = document.createElement('span');
        meta.className = 'floor-meta';

        const dot = document.createElement('span');
        dot.className = 'dot';

        const metaText = document.createElement('span');
        metaText.textContent = getMetaText(floor);

        meta.appendChild(dot);
        meta.appendChild(metaText);
        info.appendChild(name);
        info.appendChild(meta);

        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = getBadgeText(floor);

        if (floor.locked) badge.classList.add('locked');
        if (floor.index === currentFloor) badge.classList.add('current');

        button.appendChild(number);
        button.appendChild(info);
        button.appendChild(badge);

        button.addEventListener('mouseenter', () => {
          const enabledButtons = [...floorsEl.querySelectorAll('.floor:not(:disabled)')];
          const enabledIndex = enabledButtons.indexOf(button);
          if (enabledIndex >= 0) {
            selectedIndex = enabledIndex;
            focusSelected();
          }
        });

        button.addEventListener('click', () => {
          if (floor.locked) return;
          post('teleport', { floorIndex: floor.index });
        });

        floorsEl.appendChild(button);
      });

      selectedIndex = 0;
      focusSelected();
    }

    closeBtn.addEventListener('click', closeUi);

    document.addEventListener('keydown', (event) => {
      if (!body.classList.contains('visible')) return;

      if (event.key === 'Escape') {
        closeUi();
        return;
      }

      const buttons = [...floorsEl.querySelectorAll('.floor:not(:disabled)')];
      if (!buttons.length) return;

      if (event.key === 'ArrowDown') {
        event.preventDefault();
        selectedIndex = Math.min(selectedIndex + 1, buttons.length - 1);
        focusSelected();
      }

      if (event.key === 'ArrowUp') {
        event.preventDefault();
        selectedIndex = Math.max(selectedIndex - 1, 0);
        focusSelected();
      }

      if (event.key === 'Enter') {
        event.preventDefault();
        buttons[selectedIndex]?.click();
      }
    });

    window.addEventListener('message', (event) => {
      const data = event.data || {};

      if (data.action === 'open') {
        locale = data.locale || {};
        currentFloor = data.currentFloor;
        titleEl.textContent = data.title || t('elevator', 'Lift');
        renderFloors(data.floors || []);
        body.classList.add('visible');
      }

      if (data.action === 'close') {
        body.classList.remove('visible');
      }
    });
  </script>
</body>
</html>
