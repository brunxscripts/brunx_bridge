<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elevator</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap");

      body {
        margin: 0;
        padding: 0;
        display: none;
        justify-content: flex-end;
        align-items: center;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0);
        font-family: "Roboto", sans-serif;
        overflow: hidden;
        user-select: none;
      }

      .elevator-panel {
        background: linear-gradient(135deg, #0d1218f2, #151a1ff2);
        width: 370px;
        margin-right: 50px;
        border-radius: 12px;
        box-shadow: 0 0 35px rgba(0, 0, 0, 0.85);
        padding: 22px;
        color: white;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .header {
        text-align: center;
        margin-bottom: 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.14);
        padding-bottom: 14px;
      }

      .header h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 900;
      }

      .floor-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 430px;
        overflow-y: auto;
        padding: 16px 0;
      }

      .floor-list::-webkit-scrollbar {
        width: 6px;
      }

      .floor-list::-webkit-scrollbar-track {
        background: #2c3e50;
        border-radius: 999px;
      }

      .floor-list::-webkit-scrollbar-thumb {
        background: #7f8c8d;
        border-radius: 999px;
      }

      .floor-btn {
        background: #ecf0f1;
        color: #2c3e50;
        border: none;
        padding: 15px;
        font-size: 16px;
        font-weight: 900;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.18s ease;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.22);
      }

      .floor-btn:hover {
        background: #bdc3c7;
        transform: translateY(1px);
      }

      .floor-btn:active {
        transform: translateY(3px);
        box-shadow: none;
      }

      .floor-btn.current {
        background: #2563eb;
        color: #ecf0f1;
        cursor: not-allowed;
        opacity: 0.95;
        box-shadow: none;
        transform: none;
      }

      .floor-btn.locked {
        background: #3a2024;
        color: #ffb4b4;
        cursor: not-allowed;
        opacity: 0.85;
        box-shadow: none;
        transform: none;
      }

      .floor-btn small {
        font-size: 11px;
        opacity: 0.85;
        margin-left: 12px;
        text-align: right;
        white-space: nowrap;
      }

      .close-hint {
        margin-top: 14px;
        text-align: center;
        font-size: 12px;
        color: #bdc3c7;
      }
    </style>
  </head>

  <body>
    <div class="elevator-panel">
      <div class="header">
        <h1 id="title">Elevator</h1>
      </div>

      <div class="floor-list" id="floorContainer"></div>

      <div class="close-hint" id="closeHint">Press ESC to close</div>
    </div>

    <script>
      const resourceName =
        typeof GetParentResourceName === "function"
          ? GetParentResourceName()
          : "brnx_elevator_bridge";

      let locale = {};
      let currentFloorsData = [];

      window.addEventListener("message", function (event) {
        const item = event.data;

        if (item.action === "open") {
          locale = item.locale || {};
          currentFloorsData = item.floors || [];

          document.getElementById("title").innerText =
            item.title || locale.elevator || "Elevator";

          document.getElementById("closeHint").innerText =
            locale.close || "Press ESC to close";

          const container = document.getElementById("floorContainer");
          container.innerHTML = "";

          currentFloorsData.forEach((floor) => {
            const isCurrent = Number(floor.index) === Number(item.currentFloor);
            const isLocked = floor.locked === true;

            const btn = document.createElement("button");
            btn.className = "floor-btn";

            if (isCurrent) {
              btn.classList.add("current");
              btn.disabled = true;
            }

            if (isLocked) {
              btn.classList.add("locked");
              btn.disabled = true;
            }

            let statusText = "";

            if (isCurrent) {
              statusText = locale.current || "Current floor";
            } else if (isLocked) {
              statusText = floor.lockedText || locale.locked || "Locked";
            }

            btn.innerHTML = `<span>${floor.label}</span><small>${statusText}</small>`;

            if (!isCurrent && !isLocked) {
              btn.onclick = function () {
                selectFloor(floor.index);
              };
            }

            container.appendChild(btn);
          });

          document.body.style.display = "flex";
        }

        if (item.action === "close") {
          document.body.style.display = "none";
        }
      });

      function selectFloor(floorIndex) {
        fetch(`https://${resourceName}/teleport`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json; charset=UTF-8",
          },
          body: JSON.stringify({
            floorIndex: floorIndex,
          }),
        }).catch((err) => console.error("Fetch error:", err));

        document.body.style.display = "none";
      }

      document.onkeyup = function (data) {
        if (data.which === 27) {
          fetch(`https://${resourceName}/close`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json; charset=UTF-8",
            },
            body: JSON.stringify({}),
          });

          document.body.style.display = "none";
        }
      };
    </script>
  </body>
</html>
